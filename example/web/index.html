<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="air_pointer example — touchless canvas control">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="air_pointer example">
  <title>air_pointer example</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Load MediaPipe Tasks Vision as a proper ES module (vision_bundle.mjs)
    and pin the classes onto window so that dart:js_interop @JS() annotations
    can find them as globals.

    NOTE: vision_bundle.js (UMD) is intentionally NOT used here. Flutter's
    compiled JS output triggers the CommonJS branch of the UMD factory, which
    assigns exports to module.exports instead of window, leaving FilesetResolver
    and HandLandmarker undefined in the browser global scope.

    type="module" scripts are deferred — GestureInputSource.initialize() polls
    window.FilesetResolver until it appears (usually < 200 ms after load).
  -->
  <script type="module">
    import { FilesetResolver, HandLandmarker }
      from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21/vision_bundle.mjs';
    window.FilesetResolver = FilesetResolver;
    window.HandLandmarker = HandLandmarker;
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
